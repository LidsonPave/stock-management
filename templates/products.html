{% extends 'base.html' %}

{% block content %}

<h1>📦 Produtos</h1>

<div class="card">

    <button class="btn-blue">
        + Novo Produto
    </button>

    <h2>Cadastrar Produto</h2>

    <form method="POST">

        <label>Nome do Produto</label>

        <input
            type="text"
            name="name"
            placeholder="Digite o nome do produto"
            required
        >

        <label>Quantidade</label>

        <input
            type="number"
            name="quantity"
            placeholder="Digite a quantidade"
            required
        >

        <label>Preço de Compra</label>

        <input
            type="number"
            step="0.01"
            name="purchase_price"
            placeholder="Ex: 20"
            required
        >

        <label>Preço de Venda</label>

        <input
            type="number"
            step="0.01"
            name="selling_price"
            placeholder="Ex: 35"
            required
        >

        <button type="submit" class="btn-blue">
            Cadastrar Produto
        </button>

    </form>

</div>


<div class="card">

    <h2>Produtos Cadastrados</h2>

    <table>

        <tr>

            <th>ID</th>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Compra</th>
            <th>Venda</th>
            <th>Ações</th>

        </tr>

        {% for product in products %}

        <tr>

            <td>{{ product[0] }}</td>

            <td>{{ product[1] }}</td>

            <td>{{ product[2] }}</td>

            <td>{{ product[3] }}</td>

            <td>{{ product[4] }}</td>

            <td>

                <button class="btn-yellow">
                    Editar
                </button>

                <a
                    href="/delete_product/{{ product[0] }}"
                    onclick="return confirm('Tem certeza que deseja excluir este produto?')"
                >

                    <button class="btn-red">

                        Excluir

                    </button>

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
