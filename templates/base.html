<!DOCTYPE html>
<html>

<head>

    <title>Stock Management System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="sidebar" style="display: flex; flex-direction: column;">

    <!-- Cabeçalho da Logo Ampliado e Centralizado de forma elegante -->
    <div class="logo" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding: 25px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">

        <!-- Logo maior e centralizada -->
        <img src="{{ url_for('static', filename='logo.png') }}" 
             alt="Logo" 
             style="width: 75px; height: auto; display: block; margin-bottom: 12px; object-fit: contain;">

        <div>

            <!-- Título com tamanho ideal e legível -->
            <h2 style="margin: 0; font-size: 18px; color: #ffffff; font-family: sans-serif; font-weight: bold; letter-spacing: 0.5px;">Stock Management</h2>

            <p style="margin: 4px 0 0 0; font-size: 11px; color: #94a3b8; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px;">Gestão de Estoque</p>

        </div>

    </div>

    <div class="menu-title" style="padding-left: 20px; margin-bottom: 10px;">

        MENU PRINCIPAL

    </div>

    <!-- Menu ajustado com mais espaçamento interno para descer e ocupar o espaço vazio -->
    <div class="menu" style="display: flex; flex-direction: column; gap: 8px; flex-grow: 1;">

        <a href="/" style="padding: 14px 20px; font-size: 15px;">🏠 Home</a>

        <a href="/products" style="padding: 14px 20px; font-size: 15px;">📦 Produtos</a>

        <a href="/entries" style="padding: 14px 20px; font-size: 15px;">📥 Entradas</a>

        <a href="/sales" style="padding: 14px 20px; font-size: 15px;">💰 Vendas</a>

        <a href="/movements" style="padding: 14px 20px; font-size: 15px;">📜 Histórico</a>

        <a href="/cashflow" style="padding: 14px 20px; font-size: 15px;">💵 Caixa</a>

        <a href="/reports" style="padding: 14px 20px; font-size: 15px;">📊 Relatórios</a>

    </div>

</div>


<div class="content">

    {% block content %}

    {% endblock %}

</div>


<script>

function toggleForm(){

    let form = document.getElementById("product-form");

    if(form.style.display=="none"){

        form.style.display="block";

    }

    else{

        form.style.display="none";

    }

}

</script>

</body>

</html>
